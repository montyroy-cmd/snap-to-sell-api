# Local Postgres + Redis for `npm run start:dev` (copy .env.example → .env and use URLs below).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sellseva
    ports:
      - '5432:5432'
    volumes:
      - sellseva_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  sellseva_pg:
